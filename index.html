<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 创作工作台 · Personal Studio</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%A8%3C/text%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <link rel="stylesheet" href="assets/styles.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f5f3ff', 100: '#ede9fe', 500: '#8b5cf6',
              600: '#7c3aed', 700: '#6d28d9', 900: '#4c1d95',
            }
          }
        }
      }
    };
  </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <!-- Layout -->
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-60 bg-white border-r border-slate-200 flex flex-col">
      <div class="px-5 py-4 border-b border-slate-200">
        <h1 class="text-lg font-bold text-brand-700">✨ AI 创作工作台</h1>
        <p class="text-xs text-slate-500 mt-0.5">Personal Studio · v0.1</p>
      </div>
      <nav class="flex-1 p-3 space-y-1" id="nav">
        <button data-tab="workflow"       class="nav-btn">🎨  工作流</button>
        <div class="border-t border-slate-200 my-3"></div>
        <button data-tab="history"        class="nav-btn">📚  历史记录</button>
        <button data-tab="settings"       class="nav-btn">⚙️   设置 / API Key</button>
      </nav>
      <div class="p-3 text-xs text-slate-400 border-t border-slate-200">
        <p>Key 仅存您本机，永不上传</p>
        <a class="text-brand-600 hover:underline" href="README.md" target="_blank">使用说明 ↗</a>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 overflow-x-hidden">
      <div id="page-host" class="p-6 max-w-screen-2xl mx-auto"></div>
    </main>
  </div>

  <!-- Toast container -->
  <div id="toast-host" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <!-- Modal host (for image preview etc.) -->
  <div id="modal-host"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
