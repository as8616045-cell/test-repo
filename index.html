<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 创作工作台 · Personal Studio</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%237c3aed'/%3E%3Cstop offset='1' stop-color='%2306b6d4'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath fill='url(%23g)' d='M50 8l8 24 24 8-24 8-8 24-8-24L18 40l24-8z'/%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <link rel="stylesheet" href="assets/styles.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f5f3ff', 100: '#ede9fe', 500: '#8b5cf6',
              600: '#7c3aed', 700: '#6d28d9', 900: '#4c1d95',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'sans-serif'],
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="text-slate-800 antialiased">
  <!-- Layout -->
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="app-sidebar w-60 flex flex-col">
      <!-- Brand block -->
      <div class="px-5 py-5">
        <div class="flex items-center gap-2.5">
          <div class="w-8 h-8 rounded-xl flex items-center justify-center text-white text-base font-bold shadow-sm"
               style="background: linear-gradient(135deg, #7c3aed 0%, #2563eb 50%, #06b6d4 100%);">
            ✦
          </div>
          <div>
            <div class="text-[15px] font-semibold tracking-tight brand-gradient">AI Studio</div>
            <div class="text-[10.5px] text-slate-400 -mt-0.5 font-medium tracking-wide uppercase">Personal · v0.1</div>
          </div>
        </div>
      </div>

      <nav class="flex-1 px-3 space-y-1 overflow-y-auto" id="nav">
        <button data-tab="workflow" class="nav-btn"><span>🎨</span><span>工作流</span></button>
        <button data-tab="history"  class="nav-btn"><span>📚</span><span>历史记录</span></button>
        <button data-tab="settings" class="nav-btn"><span>⚙️</span><span>设置 / API</span></button>
      </nav>

      <div class="p-4 mx-3 mb-3 rounded-xl bg-slate-50/70 border border-slate-200/70">
        <div class="flex items-start gap-2">
          <span class="status-dot ok mt-1.5"></span>
          <div class="text-[11.5px] leading-relaxed text-slate-500">
            所有 Key 仅存本机<br/>
            <a class="text-brand-600 hover:underline font-medium" href="README.md" target="_blank">查看使用说明 ↗</a>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 overflow-x-hidden">
      <div id="page-host" class="p-8 max-w-screen-2xl mx-auto"></div>
    </main>
  </div>

  <!-- Toast container -->
  <div id="toast-host" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <!-- Modal host -->
  <div id="modal-host"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
